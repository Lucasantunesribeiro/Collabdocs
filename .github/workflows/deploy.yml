# AWS Lambda Deployment — CollabDocs .NET API
#
# Triggers on push to main when dotnet/** files change.
# Uses OIDC (no static AWS keys) for short-lived credentials.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN      — arn:aws:iam::246599827442:role/github-actions-collabdocs
#   AWS_REGION        — us-east-1
#   ECR_REPOSITORY    — collabdocs-api
#
# Lambda Function URL (public HTTPS endpoint):
#   https://gexxy5wfog4drgronvtfs7re4a0mcopr.lambda-url.us-east-1.on.aws/

name: Deploy .NET API to Lambda

on:
  push:
    branches: [main]
    paths:
      - "dotnet/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

env:
  AWS_DEFAULT_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: collabdocs-api

jobs:
  # ── Guard: skip gracefully when AWS secrets are not configured ──────────────
  check-aws-secrets:
    name: Check AWS Secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
        run: |
          if [ -n "$ROLE_ARN" ] && [ -n "$ECR_REPO" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS secrets not configured — skipping Lambda deploy"
          fi

  # ── Stage 1: Build & Test ────────────────────────────────────────────────────
  dotnet-build:
    name: Build & Test (.NET)
    needs: check-aws-secrets
    if: needs.check-aws-secrets.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: dotnet

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: dotnet

      - name: Run unit tests
        run: dotnet test tests/CollabDocs.Tests.Unit --no-build -c Release --verbosity normal
        working-directory: dotnet

  # ── Stage 2: Build Docker image & push to ECR ───────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: dotnet-build
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: github-actions-collabdocs-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --file dotnet/src/CollabDocs.API/Dockerfile \
            --context dotnet \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Stage 3: Update Lambda function code ────────────────────────────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: github-actions-collabdocs-deploy-${{ github.run_id }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "${{ needs.build-and-push.outputs.image }}" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}"

      - name: Wait for Lambda update to complete
        run: |
          echo "Waiting for Lambda update to complete..."
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}"
          echo "Lambda update complete."

      - name: Verify health endpoint
        run: |
          FUNCTION_URL="https://gexxy5wfog4drgronvtfs7re4a0mcopr.lambda-url.us-east-1.on.aws"
          echo "Checking health at $FUNCTION_URL/health ..."
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUNCTION_URL/health" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 8 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed."
          echo "Check Lambda logs: aws logs tail /aws/lambda/collabdocs-api --follow"
