# AWS App Runner Deployment — CollabDocs .NET API
#
# Triggers on push to main when dotnet/** files change.
# Uses OIDC (no static AWS keys) for short-lived credentials.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN      — IAM role ARN with OIDC trust
#   AWS_REGION        — Target region (e.g. us-east-1)
#   ECR_REPOSITORY    — ECR repo name (e.g. collabdocs-api)
#
# Stack outputs used automatically:
#   collabdocs → ServiceArn   (App Runner service ARN)
#   collabdocs → ServiceUrl   (HTTPS endpoint for health check)

name: Deploy .NET API to App Runner

on:
  push:
    branches: [main]
    paths:
      - "dotnet/**"
      - "aws/apprunner.yml"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  # ── Guard: skip gracefully when AWS secrets are not configured ──────────────
  check-aws-secrets:
    name: Check AWS Secrets
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
        run: |
          if [ -n "$ROLE_ARN" ] && [ -n "$ECR_REPO" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS secrets not configured — skipping App Runner deploy"
          fi

  # ── Stage 1: Build & Test ────────────────────────────────────────────────────
  dotnet-build:
    name: Build & Test (.NET)
    needs: check-aws-secrets
    if: needs.check-aws-secrets.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: dotnet

      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: dotnet

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: dotnet

  # ── Stage 2: Build Docker image & push to ECR ───────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: dotnet-build
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: github-actions-collabdocs-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --file dotnet/src/CollabDocs.API/Dockerfile \
            --context dotnet \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Stage 3: Deploy to App Runner ───────────────────────────────────────────
  deploy:
    name: Deploy to App Runner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          role-session-name: github-actions-collabdocs-deploy-${{ github.run_id }}

      - name: Get App Runner service ARN from CloudFormation
        id: get-service
        run: |
          SERVICE_ARN=$(aws cloudformation describe-stacks \
            --stack-name collabdocs \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceArn'].OutputValue" \
            --output text)
          SERVICE_URL=$(aws cloudformation describe-stacks \
            --stack-name collabdocs \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceUrl'].OutputValue" \
            --output text)
          echo "service-arn=$SERVICE_ARN" >> "$GITHUB_OUTPUT"
          echo "service-url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "App Runner service: $SERVICE_URL"

      - name: Update App Runner service with new image
        run: |
          aws apprunner update-service \
            --service-arn "${{ steps.get-service.outputs.service-arn }}" \
            --source-configuration "{
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ needs.build-and-push.outputs.image }}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {\"Port\": \"5000\"}
              },
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"$(aws iam get-role --role-name collabdocs-apprunner-access-role --query 'Role.Arn' --output text)\"
              }
            }"

      - name: Wait for App Runner deployment to complete
        run: |
          SERVICE_ARN="${{ steps.get-service.outputs.service-arn }}"
          echo "Waiting for App Runner deployment..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' \
              --output text)
            echo "Attempt $i/30 — Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete."
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "Deployment timed out after 10 minutes."
          exit 1

      - name: Verify health endpoint
        run: |
          SERVICE_URL="${{ steps.get-service.outputs.service-url }}"
          echo "Checking health at $SERVICE_URL/api/health ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 6 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed."
          echo "Check App Runner logs in the AWS Console → App Runner → collabdocs-api → Logs"
