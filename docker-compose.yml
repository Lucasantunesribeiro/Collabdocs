version: '3.9'
services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      # .NET API — Document Management Context (CRUD, business rules, audit logging)
      - NEXT_PUBLIC_DOTNET_API_URL=http://localhost:5000/api
      # Cloudflare Worker — Real-Time Collaboration Context (WebSocket, presence)
      - NEXT_PUBLIC_API_URL=http://localhost:8787/api
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - worker
      - dotnet-api

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx wrangler dev --local --port 8787"
    ports:
      - "8787:8787"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ALLOWED_ORIGINS=http://localhost:3000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: collabdocs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dotnet-api:
    build:
      context: dotnet
      dockerfile: src/CollabDocs.API/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=collabdocs;Username=postgres;Password=postgres
      - Jwt__Secret=${NEXTAUTH_SECRET}
      - AllowedOrigins__0=http://localhost:3000
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - RabbitMQ__ExchangeName=collabdocs.events
      - RabbitMQ__QueueName=collabdocs.documents
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI (http://localhost:15672, guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
