name = "collab-docs"
main = "workers/index.ts"
compatibility_date = "2024-08-20"

[env.production]
vars = { ENVIRONMENT = "production" }

[[d1_databases]]
binding = "DB"
database_name = "COLLAB_DOCS_DB"
database_id = "e0a23c1f-745b-48cd-8269-08aa103a4434"

[[durable_objects.bindings]]
name = "COLLAB_SESSIONS"
class_name = "DocumentSession"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_classes = ["DocumentSession"]

[[migrations]]
tag = "v2"
new_classes = ["RateLimiter"]

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "collabdocs-email-notifications"

[[queues.consumers]]
queue = "collabdocs-email-notifications"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "collabdocs-email-dlq"

# Configurações de observabilidade e logs
[observability]
enabled = true
head_sampling_rate = 1